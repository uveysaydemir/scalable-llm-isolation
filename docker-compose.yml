services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 20

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_LLM_MODEL: ${OLLAMA_LLM_MODEL:-llama3.2:1b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      ollama pull ${OLLAMA_LLM_MODEL} &&
      ollama pull ${OLLAMA_EMBED_MODEL}
      "

  edge-node:
    build:
      context: ./edge-node
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      EDGE_NODE_ID: ${EDGE_NODE_ID:-edge-node-1}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-120}
    volumes:
      - ./edge-node/app:/app/app:ro
      - ./edge-node/tests:/app/tests:ro
    depends_on:
      qdrant:
        condition: service_started
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully

  handover-tests:
    build:
      context: ./edge-node
      dockerfile: Dockerfile.handover-test
    profiles:
      - test
    command: ["python", "-m", "unittest", "discover", "-s", "tests"]

volumes:
  qdrant_data:
  ollama_data:
