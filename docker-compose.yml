services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 20

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_LLM_MODEL: ${OLLAMA_LLM_MODEL:-llama3.2:1b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      ollama pull ${OLLAMA_LLM_MODEL} &&
      ollama pull ${OLLAMA_EMBED_MODEL}
      "

  memory-layer:
    image: scalable-llm-isolation-memory-layer
    build:
      context: ./memory-layer
    ports:
      - "8090:8090"
    env_file:
      - .env
    volumes:
      - ./memory-layer/app:/service/app:ro
    depends_on:
      qdrant:
        condition: service_started
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8090/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s

  edge-node-left:
    image: scalable-llm-isolation-edge-node
    build:
      context: ./edge-node
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      EDGE_NODE_ID: edge-node-left
      EDGE_TOPOLOGY: edge-node-left,edge-node-right
      EDGE_NEIGHBOR_RIGHT_URL: http://edge-node-right:8080
      MEMORY_LAYER_URL: http://memory-layer:8090
    volumes:
      - ./edge-node/app:/app/app:ro
      - ./edge-node/tests:/app/tests:ro
    depends_on:
      memory-layer:
        condition: service_healthy

  edge-node-right:
    image: scalable-llm-isolation-edge-node
    build:
      context: ./edge-node
    ports:
      - "8083:8080"
    env_file:
      - .env
    environment:
      EDGE_NODE_ID: edge-node-right
      EDGE_TOPOLOGY: edge-node-left,edge-node-right
      EDGE_NEIGHBOR_LEFT_URL: http://edge-node-left:8080
      MEMORY_LAYER_URL: http://memory-layer:8090
    volumes:
      - ./edge-node/app:/app/app:ro
      - ./edge-node/tests:/app/tests:ro
    depends_on:
      memory-layer:
        condition: service_healthy

  handover-tests:
    build:
      context: ./edge-node
      dockerfile: Dockerfile.handover-test
    profiles:
      - test
    command: ["python", "-m", "unittest", "discover", "-s", "tests"]

volumes:
  qdrant_data:
  ollama_data:
